apiVersion: apps/v1
kind: Deployment
metadata:
  name: liora-secrets
  namespace: liora
spec:
  replicas: 1
  selector:
    matchLabels:
      name: liora-secrets
  template:
    metadata:
      labels:
        name: liora-secrets
    spec:
      containers:
        # This contaner will use plain ENV parametrs
        - name: secrets
          image: nirgeier/k8s-secrets-sample
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: LANGUAGE
              valueFrom:
                configMapKeyRef:    # This value will be read from the config map
                  name:   language  # The name of the ConfigMap
                  key:    LANGUAGE  # The key in the config map
            - name: TOKEN
              valueFrom:
                  secretKeyRef:         # This value will be read from the secret
                      name:   token     # The name of the secret
                      key:    TOKEN     # The key in the secret
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: liora-secrets
  namespace: liora
spec:
  selector:
    name: liora-secrets
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
        
